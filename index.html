<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BelanjaKu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- DAFTAR -->
  <div class="container" id="registerPage">
    <div class="card">
      <h1>Daftar Akun</h1>
      <input type="text" id="regUsername" placeholder="Username">
      <input type="password" id="regPassword" placeholder="Password">
      <button onclick="register()">Daftar</button>
      <p>Sudah punya akun? <a href="#" onclick="showLogin()">Login</a></p>
    </div>
  </div>

  <!-- LOGIN -->
  <div class="container" id="loginPage" style="display:none;">
    <div class="card">
      <h1>Login</h1>
      <input type="text" id="loginUsername" placeholder="Username">
      <input type="password" id="loginPassword" placeholder="Password">
      <button onclick="login()">Login</button>
      <p>Belum punya akun? <a href="#" onclick="showRegister()">Daftar</a></p>
    </div>
  </div>

  <!-- PRODUK -->
  <div id="productPage" style="display:none;">
    <header>
      <h1>🛒 BelanjaKu</h1>
    </header>

    <section class="products">
      <h2>Produk Kami</h2>

      <div class="product-grid">

        <div class="product-card">
          <img src="keyboard.jpg">
          <h3>Keyboard Gaming</h3>
          <p>Rp 250.000</p>
          <button>Beli</button>
        </div>

        <div class="product-card">
          <img src="mouse.jpg">
          <h3>Mouse Gaming</h3>
          <p>Rp 150.000</p>
          <button>Beli</button>
        </div>

        <div class="product-card">
          <img src="monitor.jpg">
          <h3>Monitor</h3>
          <p>Rp 1.500.000</p>
          <button>Beli</button>
        </div>

        <div class="product-card">
          <img src="kursi.jpg">
          <h3>Kursi Gaming</h3>
          <p>Rp 900.000</p>
          <button>Beli</button>
        </div>

        <div class="product-card">
          <img src="headset.jpg">
          <h3>Headset</h3>
          <p>Rp 300.000</p>
          <button>Beli</button>
        </div>

      </div>
    </section>
  </div>

<script>
function register(){
    let username = document.getElementById("regUsername").value;
    let password = document.getElementById("regPassword").value;

    if(username==="" || password===""){
        alert("Isi semua dulu!");
        return;
    }

    localStorage.setItem("username", username);
    localStorage.setItem("password", password);

    alert("Daftar berhasil, silakan login!");
    showLogin();
}

function login(){
    let username = document.getElementById("loginUsername").value;
    let password = document.getElementById("loginPassword").value;

    let savedUser = localStorage.getItem("username");
    let savedPass = localStorage.getItem("password");

    if(username===savedUser && password===savedPass){
        document.getElementById("loginPage").style.display="none";
        document.getElementById("productPage").style.display="block";
    }else{
        alert("Username atau password salah!");
    }
}

function showLogin(){
    document.getElementById("registerPage").style.display="none";
    document.getElementById("loginPage").style.display="flex";
}

function showRegister(){
    document.getElementById("loginPage").style.display="none";
    document.getElementById("registerPage").style.display="flex";
}
</script>

</body>
</html>
