<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOKO LUQNI</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DAFTAR -->
<div class="container" id="registerPage">
  <div class="card">
    <h1>Daftar Akun</h1>
    <input type="text" id="regUsername" placeholder="Username">
    <input type="password" id="regPassword" placeholder="Password">
    <button onclick="register()">Daftar</button>
    <p>Sudah punya akun? <a href="#" onclick="showLogin()">Login</a></p>
  </div>
</div>

<!-- LOGIN -->
<div class="container" id="loginPage" style="display:none;">
  <div class="card">
    <h1>Login</h1>
    <input type="text" id="loginUsername" placeholder="Username">
    <input type="password" id="loginPassword" placeholder="Password">
    <button onclick="login()">Login</button>
    <p>Belum punya akun? <a href="#" onclick="showRegister()">Daftar</a></p>
  </div>
</div>

<!-- PRODUK -->
<div id="productPage" style="display:none;">

  <header>
    <h1>🛒 TOKO LUQNI</h1>
  </header>

  <section class="products">
    <h2>Produk Kami</h2>

    <div class="product-grid">

      <div class="product-card" onclick="pilihBarang('Headset Gaming',150000)">
        <img src="headset.jpg">
        <h3>Headset Gaming</h3>
        <p>Rp 150.000</p>
      </div>

      <div class="product-card" onclick="pilihBarang('Kursi Gaming',900000)">
        <img src="kursi.jpg">
        <h3>Kursi Gaming</h3>
        <p>Rp 900.000</p>
      </div>

      <div class="product-card" onclick="pilihBarang('Mouse Gaming',450000)">
        <img src="mouse.jpg">
        <h3>Mouse Gaming</h3>
        <p>Rp 450.000</p>
      </div>

      <div class="product-card" onclick="pilihBarang('Monitor',3000000)">
        <img src="monitor.jpg">
        <h3>Monitor</h3>
        <p>Rp 3.000.000</p>
      </div>

      <div class="product-card" onclick="pilihBarang('Keyboard',250000)">
        <img src="keyboard.jpg">
        <h3>Keyboard</h3>
        <p>Rp 250.000</p>
      </div>

      <div class="product-card" onclick="pilihBarang('Keyboard Gaming',600000)">
        <img src="keyboard gaming.jpg">
        <h3>Keyboard Gaming</h3>
        <p>Rp 600.000</p>
      </div>

    </div>
  </section>

  <!-- CHECKOUT -->
  <section class="checkout">
    <h2>🛒 Checkout Barang</h2>

    <label>Nama Barang:</label>
    <input type="text" id="barang" readonly>

    <label>Harga:</label>
    <input type="text" id="harga" readonly>

    <label>Masukkan Kupon:</label>
    <input type="text" id="kupon" placeholder="Contoh: LUQNI / YADIKA2">

    <button onclick="cekKupon()">Gunakan Kupon</button>

    <h3 id="diskonText">Diskon: Rp 0</h3>
    <h2 id="totalBayar">Total: Rp 0</h2>

    <label>Metode Pembayaran:</label>
    <select id="metode">
      <option value="">Pilih Metode</option>
      <option value="DANA">DANA</option>
      <option value="GoPay">GoPay</option>
      <option value="OVO">OVO</option>
      <option value="Transfer Bank">Transfer Bank</option>
      <option value="COD">COD</option>
    </select>

    <label>Nomor Pembayaran (E-Wallet / Rekening Bank):</label>
    <input type="text" id="nomorEwallet" placeholder="Contoh: 08123456789">

    <button onclick="bayar()">Bayar Sekarang</button>
  </section>

</div>

<script>
// REGISTER
function register(){
  let username = document.getElementById("regUsername").value;
  let password = document.getElementById("regPassword").value;

  if(username === "" || password === ""){
    alert("Isi semua dulu!");
    return;
  }

  localStorage.setItem("username", username);
  localStorage.setItem("password", password);

  alert("Daftar berhasil!");
  showLogin();
}

// LOGIN
function login(){
  let username = document.getElementById("loginUsername").value;
  let password = document.getElementById("loginPassword").value;

  let savedUser = localStorage.getItem("username");
  let savedPass = localStorage.getItem("password");

  if(username === savedUser && password === savedPass){
    document.getElementById("loginPage").style.display = "none";
    document.getElementById("productPage").style.display = "block";
  } else {
    alert("Username atau password salah!");
  }
}

function showLogin(){
  document.getElementById("registerPage").style.display = "none";
  document.getElementById("loginPage").style.display = "flex";
}

function showRegister(){
  document.getElementById("loginPage").style.display = "none";
  document.getElementById("registerPage").style.display = "flex";
}

// PILIH BARANG
let hargaAsli = 0;
let total = 0;

function pilihBarang(nama, harga){
  document.getElementById("barang").value = nama;
  document.getElementById("harga").value = harga;

  hargaAsli = harga;
  total = harga;

  document.getElementById("diskonText").innerHTML = "Diskon: Rp 0";
  document.getElementById("totalBayar").innerHTML =
    "Total: Rp " + total.toLocaleString("id-ID");

  document.querySelector(".checkout").scrollIntoView({
    behavior: "smooth"
  });
}

// KUPON
function cekKupon(){
  let kupon = document.getElementById("kupon").value.toUpperCase();

  if(hargaAsli === 0){
    alert("Pilih barang dulu!");
    return;
  }

  if(kupon === "LUQNI"){
    let diskon = hargaAsli * 0.30;
    total = hargaAsli - diskon;
    document.getElementById("diskonText").innerHTML =
      "Diskon 30%: Rp " + diskon.toLocaleString("id-ID");
  }
  else if(kupon === "YADIKA2"){
    let diskon = hargaAsli * 0.50;
    total = hargaAsli - diskon;
    document.getElementById("diskonText").innerHTML =
      "Diskon 50%: Rp " + diskon.toLocaleString("id-ID");
  }
  else{
    total = hargaAsli;
    document.getElementById("diskonText").innerHTML =
      "Kupon tidak valid";
  }

  document.getElementById("totalBayar").innerHTML =
    "Total: Rp " + total.toLocaleString("id-ID");
}

// BAYAR
function bayar(){
  if(hargaAsli === 0){
    alert("Pilih barang dulu!");
    return;
  }

  let metode = document.getElementById("metode").value;
  let nomor = document.getElementById("nomorEwallet").value;

  if(metode === ""){
    alert("Pilih metode pembayaran dulu!");
    return;
  }

  if(
    (metode === "DANA" ||
     metode === "GoPay" ||
     metode === "OVO" ||
     metode === "Transfer Bank")
    && nomor === ""
  ){
    alert("Masukkan nomor pembayaran!");
    return;
  }

  if(
    (metode === "DANA" ||
     metode === "GoPay" ||
     metode === "OVO" ||
     metode === "Transfer Bank")
    && nomor.length < 10
  ){
    alert("Nomor tidak valid!");
    return;
  }

  let pesan =
    "Pembayaran berhasil!\n" +
    "Metode: " + metode + "\n" +
    "Total: Rp " + total.toLocaleString("id-ID");

  if(metode !== "COD"){
    pesan += "\nNomor: " + nomor;
  }

  alert(pesan);
}
</script>

</body>
</html>
